<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a19;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141413;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="plugGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8875A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#DA7756;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C15F3C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFB38A;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#FFB38A;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#bgGrad)" stroke="#DA7756" stroke-width="2" stroke-opacity="0.3"/>

  <!-- Orbital rings -->
  <g opacity="0.15" filter="url(#softGlow)">
    <ellipse cx="200" cy="210" rx="140" ry="50" fill="none" stroke="#DA7756" stroke-width="1.5" transform="rotate(-25 200 210)"/>
    <ellipse cx="200" cy="210" rx="110" ry="40" fill="none" stroke="#DA7756" stroke-width="1.2" transform="rotate(-25 200 210)"/>
    <ellipse cx="200" cy="210" rx="80" ry="30" fill="none" stroke="#DA7756" stroke-width="1" transform="rotate(-25 200 210)"/>
  </g>

  <!-- Butt plug shape -->
  <g filter="url(#glow)">
    <path d="
      M 200 70
      C 200 70, 170 90, 162 130
      C 154 170, 155 195, 165 220
      C 175 245, 195 250, 195 250
      L 195 250
      C 192 252, 188 258, 186 265
      C 184 272, 185 275, 188 278
      L 188 278
      C 175 282, 160 290, 155 300
      C 150 310, 152 320, 160 326
      C 168 332, 185 335, 200 335
      C 215 335, 232 332, 240 326
      C 248 320, 250 310, 245 300
      C 240 290, 225 282, 212 278
      L 212 278
      C 215 275, 216 272, 214 265
      C 212 258, 208 252, 205 250
      L 205 250
      C 205 250, 225 245, 235 220
      C 245 195, 246 170, 238 130
      C 230 90, 200 70, 200 70
      Z
    " fill="url(#plugGrad)"/>

    <!-- Shine highlight -->
    <path d="
      M 192 80
      C 192 80, 176 100, 172 135
      C 168 170, 170 195, 177 218
      C 180 225, 185 230, 190 240
      C 185 230, 175 215, 172 195
      C 165 160, 170 120, 185 90
      Z
    " fill="url(#shine)" opacity="0.5"/>
  </g>

  <!-- Text: MCP -->
  <text x="200" y="378" text-anchor="middle" font-family="SF Mono, Menlo, Consolas, monospace" font-size="14" fill="#DA7756" opacity="0.7" letter-spacing="6">MCP BUTTPLUG</text>
</svg>
